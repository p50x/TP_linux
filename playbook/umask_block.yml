---
- hosts: all
  tasks:
    - block:
      - name: umask
        replace:
          path: /etc/skel/.profile
          regexp: '^#*umask [0-9]*'
          replace: 'umask 002'

      - name: confirmation
        debug:
          msg: "Umask configuré sur {{ ansible_hostname }}"
      rescue:
        - name: affichage d'un message d'erreur
          debug:
            msg: "Les distributions {{ ansible_os_family }} n'ont pas de .profile"
        - name: umask redhat
          lineinfile:
            path: /etc/skel/.bash_profile
            line: umask 002
