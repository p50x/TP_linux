---
- hosts:
  - dmz
  - local
  tasks:
    - name: "upgrade debian family"
      apt:
        update_cache: yes
        upgrade: full
      when: ansible_os_family == 'Debian'
    - name: "upgrade redhat family"
      dnf:
        name: '*'
        state: latest
      when: ansible_os_family == 'RedHat'
